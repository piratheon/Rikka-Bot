services:
  bot:
    build: .
    image: rk-agent:latest
    container_name: rk_agent
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./soul.md:/app/soul.md:ro
      - /var/run/docker.sock:/var/run/docker.sock
    env_file: .env
    environment:
      - DATABASE_PATH=/app/data/rk.db
      - PYTHONUNBUFFERED=1
    init: true
